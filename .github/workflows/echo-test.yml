name: Run C File from Repo

on: [push]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      # 【超重要】これを入れることで、リポジトリのファイル（hello.c）をUbuntu内に持ってくる！
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 持ってきたhello.cをgccでビルドする
      - name: Compile C Program
        run: gcc hello.c -o my_git_app

      # 実行する
      - name: Execute Program
        run: ./my_git_app
